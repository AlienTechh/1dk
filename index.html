<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RandomOS 1.0 Beta</title>
    <style>
        :root {
            --anim-speed: 0.5s;
            /* Theme Variables */
            --bg-color: #f2f2f7;
            --card-bg: white;
            --text-color: #000;
            --status-text: white;
        }

        /* Light Mode Classes (Default) */
        .light-theme {
            --bg-color: #f2f2f7;
            --card-bg: white;
            --text-color: #000;
            --status-text: #000;
        }

        /* Dark Mode Classes */
        .dark-theme {
            --bg-color: #1c1c1e;
            --card-bg: #2c2c2e;
            --text-color: #ffffff;
            --status-text: white;
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif; 
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        
        body { 
            background: #121212; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden;
        }

        .phone {
            width: 310px;
            height: 640px;
            background: #000;
            border: 12px solid #222;
            border-radius: 50px;
            position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        .screen-container {
            width: 100%;
            height: 100%;
            border-radius: 38px;
            overflow: hidden;
            position: relative;
            background: #000;
        }

        /* STATUS BAR */
        .status-bar {
            position: absolute;
            top: 0;
            width: 100%;
            height: 35px;
            padding: 0 22px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 4500;
            color: var(--status-text); /* Dynamic color */
            transition: color 0.3s;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .status-right { display: flex; align-items: center; gap: 5px; }
        .battery-icon {
            width: 20px;
            height: 10px;
            border: 1px solid var(--status-text);
            border-radius: 3px;
            position: relative;
        }
        .battery-level {
            position: absolute;
            left: 1px; top: 1px;
            height: 6px; width: 80%;
            background: var(--status-text);
        }

        /* DYNAMIC ISLAND / PUNCH HOLE */
        .punch-hole {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 20px;
            background: #000;
            border-radius: 50%;
            z-index: 5000;
            transition: width 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), 
                        height 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), 
                        border-radius 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 0.6rem;
            white-space: nowrap;
            overflow: hidden;
        }

        .punch-hole.charging-island {
            width: 180px;
            height: 25px;
            border-radius: 20px;
        }

        .punch-hole span {
            opacity: 0;
            transition: opacity 0.3s;
        }

        .punch-hole.charging-island span {
            opacity: 1;
        }

        .power-btn {
            position: absolute;
            right: -15px;
            top: 120px;
            width: 6px;
            height: 50px;
            background: #444;
            border-radius: 0 5px 5px 0;
            cursor: pointer;
            z-index: 9500;
        }

        /* POWER MENU & GALAXY BOOT */
        #power-menu {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(15px);
            z-index: 8000;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 25px;
        }
        .power-option { 
            color: white; 
            font-size: 1.2rem; 
            padding: 10px 20px;
            cursor: pointer; 
        }
        .power-option.red { color: #ff453a; font-weight: bold; }
