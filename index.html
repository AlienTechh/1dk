<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RandomOS 1.0 Beta</title>
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif; 
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        
        body { background: #121212; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }

        .phone {
            width: 310px;
            height: 640px;
            background: #000;
            border: 12px solid #222;
            border-radius: 50px;
            position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        .screen-container {
            width: 100%;
            height: 100%;
            border-radius: 38px;
            overflow: hidden;
            position: relative;
            background: #000;
        }

        /* STATUS BAR */
        .status-bar {
            position: absolute;
            top: 0; width: 100%; height: 35px;
            padding: 0 22px; display: flex; justify-content: space-between;
            align-items: center; z-index: 4500; color: white;
            font-size: 0.75rem; font-weight: 600;
        }

        .punch-hole {
            position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
            width: 20px; height: 20px; background: #000; border-radius: 50%; z-index: 5000;
        }

        /* WALLPAPER */
        .wallpaper {
            position: absolute; width: 100%; height: 100%;
            background-color: #1a1a1a;
            background-image: url('1000005643.jpg');
            background-size: cover; background-position: center;
            transition: transform 0.6s cubic-bezier(0.2, 0, 0, 1), filter 0.6s;
            z-index: 1;
        }
        .wallpaper.app-active { transform: scale(1.1); filter: blur(10px) brightness(0.7); }

        /* SCREENS */
        .screen { position: absolute; width: 100%; height: 100%; z-index: 5; transition: opacity 0.4s ease; }
        .hidden { opacity: 0; pointer-events: none; }

        #lock-screen { display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; }
        .time { font-size: 3.8rem; font-weight: 200; }

        #home-screen { padding: 60px 20px; }
        .app-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
        
        .app { display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: transform 0.1s; }
        .app:active { transform: scale(0.9); }
        .icon {
            width: 55px; height: 55px; border-radius: 14px; margin-bottom: 6px;
            display: flex; justify-content: center; align-items: center;
            font-size: 1.6rem; background: white; box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .app span { color: white; font-size: 0.7rem; font-weight: 500; }

        /* PREMIUM ZOOM ANIMATION */
        .app-window {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #f2f2f7; z-index: 1000;
            border-radius: 38px;
            padding: 60px 25px;
            
            /* The Secret Sauce: Dynamic Origin + Custom Bezier */
            opacity: 0;
            pointer-events: none;
            transform: scale(0.1);
            transition: 
                transform 0.5s cubic-bezier(0.32, 0.72, 0, 1), 
                opacity 0.3s cubic-bezier(0.32, 0.72, 0, 1),
                border-radius 0.5s;
        }

        .app-window.open { 
            opacity: 1; 
            transform: scale(1) !important; /* Force override the inline style from JS */
            top: 0 !important; left: 0 !important;
            pointer-events: all;
            border-radius: 38px;
        }

        /* SETTINGS STYLES */
        .settings-item {
            background: white; padding: 18px; border-radius: 15px; margin-bottom: 12px;
            display: flex; justify-content: space-between; align-items: center;
            color: #000; font-weight: 600; cursor: pointer;
        }
        .back-btn { color: #007aff; font-weight: 700; margin-bottom: 25px; cursor: pointer; }

        /* NAVIGATION */
        #nav-container {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 45px;
            z-index: 5600; display: flex; justify-content: center; align-items: flex-end;
            padding-bottom: 8px;
        }

        #home-bar { width: 120px; height: 5px; background: rgba(255,255,255,0.7); border-radius: 10px; cursor: pointer; }

        #three-buttons { width: 100%; display: none; justify-content: space-around; align-items: center; padding: 0 30px; }
        .nav-btn { color: white; font-size: 1.3rem; cursor: pointer; width: 50px; height: 35px; display: flex; justify-content: center; align-items: center; }

        #unlock-trigger { position: absolute; bottom: 0; width: 100%; height: 100%; background: transparent; cursor: pointer; }
    </style>
</head>
<body>

    <div class="phone">
        <div class="screen-container">
            <div class="status-bar">
                <div id="status-time">00:00</div>
                <div class="status-right">5G 🔋</div>
            </div>

            <div class="punch-hole"></div>
            <div class="wallpaper" id="main-wallpaper"></div>

            <div id="lock-screen" class="screen active">
                <div class="time" id="clock-large">00:00</div>
                <div class="date">Friday, April 10</div>
            </div>

            <div id="home-screen" class="screen hidden">
                <div class="app-grid">
                    <div class="app" onclick="openApp(this, 'settings-main')">
                        <div class="icon">⚙️</div>
                        <span>Settings</span>
                    </div>
                    <div class="app" onclick="openApp(this, 'app-placeholder')">
                        <div class="icon" style="background: #ff9500; color: white;">✉️</div>
                        <span>Mail</span>
                    </div>
                </div>
            </div>

            <div id="settings-main" class="app-window">
                <h1>Settings</h1>
                <div class="settings-item" onclick="showSubPage('nav-settings')">
                    <span>Navigation Bar</span>
                    <span>❯</span>
                </div>
                <div class="settings-item">
                    <span>Display & Brightness</span>
                    <span>❯</span>
                </div>
            </div>

            <div id="nav-settings" class="app-window">
                <div class="back-btn" onclick="showSubPage('settings-main')">❮ Back</div>
                <h2>Navigation Style</h2>
                <div class="settings-item" onclick="setNavStyle('swipe')">Swipe Navigation</div>
                <div class="settings-item" onclick="setNavStyle('buttons')">3-Button Navigation</div>
            </div>

            <div id="app-placeholder" class="app-window" style="background: white;">
                <div class="back-btn" onclick="handleHomeAction()">❮ Back</div>
                <h1>Coming Soon</h1>
                <p>App animations are now point-of-origin based.</p>
            </div>

            <div id="nav-container">
                <div id="unlock-trigger" onclick="handleHomeAction()"></div>
                <div id="home-bar" onclick="handleHomeAction()" style="display:none;"></div>
                <div id="three-buttons">
                    <div class="nav-btn" onclick="handleHomeAction()">◂</div>
                    <div class="nav-btn" onclick="handleHomeAction()">●</div>
                    <div class="nav-btn">■</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentNavMode = 'swipe';
        let lastAppOrigin = { x: '50%', y: '50%' };

        function openApp(el, id) {
            const appWindow = document.getElementById(id);
            const icon = el.querySelector('.icon');
            const rect = icon.getBoundingClientRect();
            const parentRect = document.querySelector('.screen-container').getBoundingClientRect();

            // Calculate exact center of the icon relative to the screen
            const originX = rect.left + rect.width / 2 - parentRect.left;
            const originY = rect.top + rect.height / 2 - parentRect.top;

            // Set the transform origin so it grows from the icon
            appWindow.style.transformOrigin = `${originX}px ${originY}px`;
            appWindow.style.transform = `scale(0.1)`;
            
            // Store for closing animation
            lastAppOrigin = { x: originX, y: originY };

            // Trigger animation
            setTimeout(() => {
                appWindow.classList.add('open');
                document.getElementById('main-wallpaper').classList.add('app-active');
            }, 10);
        }

        function handleHomeAction() {
            const openApp = document.querySelector('.app-window.open');
            if (openApp) {
                // Shrink back to the specific icon origin
                openApp.style.transform = `scale(0.1)`;
                openApp.classList.remove('open');
                document.getElementById('main-wallpaper').classList.remove('app-active');
            } else {
                // Unlock logic
                document.getElementById('lock-screen').classList.add('hidden');
                document.getElementById('home-screen').classList.remove('hidden');
            }
            updateNavVisibility();
        }

        function setNavStyle(style) {
            currentNavMode = style;
            updateNavVisibility();
            showSubPage('settings-main');
        }

        function updateNavVisibility() {
            const isLocked = !document.getElementById('lock-screen').classList.contains('hidden');
            document.getElementById('unlock-trigger').style.display = isLocked ? 'block' : 'none';
            
            if (!isLocked) {
                document.getElementById('home-bar').style.display = currentNavMode === 'swipe' ? 'block' : 'none';
                document.getElementById('three-buttons').style.display = currentNavMode === 'buttons' ? 'flex' : 'none';
            }
        }

        function showSubPage(id) {
            document.querySelectorAll('.app-window').forEach(win => {
                if(win.id === id) {
                    win.style.transformOrigin = 'center'; // Sub-pages zoom from center
                    win.classList.add('open');
                } else {
                    win.classList.remove('open');
                }
            });
        }

        // Clock logic
        setInterval(() => {
            const now = new Date();
            const time = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
            document.getElementById('clock-large').innerText = time;
            document.getElementById('status-time').innerText = time;
        }, 1000);

        updateNavVisibility();
    </script>
</body>
</html>
