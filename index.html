<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web OS Emulator</title>
    <style>
        /* 1. The Workbench (Background) */
        body {
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* 2. The Physical Phone Frame */
        .phone-frame {
            width: 300px;
            height: 600px;
            background: #000;
            border-radius: 40px;
            border: 8px solid #333;
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            overflow: hidden; /* Clips the software inside the frame */
        }

        /* 3. The Screen/OS Container */
        .screen {
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, #ff9a9e 0%, #fad0c4 99%, #fad0c4 100%);
            display: flex;
            flex-direction: column;
            transition: all 0.5s ease;
        }

        /* 4. Status Bar (Time, Battery) */
        .status-bar {
            height: 30px;
            padding: 10px 20px 0;
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            font-weight: bold;
            color: #333;
        }

        /* 5. App Grid */
        .app-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            padding: 20px;
            margin-top: 20px;
        }

        .app-icon {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .app-icon:active {
            transform: scale(0.9);
        }

        .icon-box {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .app-label {
            font-size: 10px;
            color: #333;
        }

        /* 6. Navigation Bar (Bottom) */
        .nav-bar {
            position: absolute;
            bottom: 10px;
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .home-button {
            width: 100px;
            height: 5px;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            cursor: pointer;
        }

        /* Settings Page (Hidden by default) */
        #settings-page {
            position: absolute;
            top: 100%; /* Slide down effect */
            left: 0;
            width: 100%;
            height: 100%;
            background: #fff;
            transition: top 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 40px 20px;
            box-sizing: border-box;
        }

        #settings-page.active {
            top: 0;
        }
    </style>
</head>
<body>

    <div class="phone-frame">
        <div class="screen">
            <div class="status-bar">
                <span id="clock">05:14</span>
                <span>5G 🔋</span>
            </div>

            <div class="app-grid">
                <div class="app-icon" onclick="openSettings()">
                    <div class="icon-box" style="background: #8e8e93;">⚙️</div>
                    <span class="app-label">Settings</span>
                </div>
                <div class="app-icon">
                    <div class="icon-box" style="background: #007aff;">📞</div>
                    <span class="app-label">Dialer</span>
                </div>
                <div class="app-icon">
                    <div class="icon-box" style="background: #34c759;">📷</div>
                    <span class="app-label">Gallery</span>
                </div>
                <div class="app-icon">
                    <div class="icon-box" style="background: #ff9500;">🎵</div>
                    <span class="app-label">Music</span>
                </div>
            </div>

            <div id="settings-page">
                <h2>Settings</h2>
                <hr>
                <p><strong>Device:</strong> WebPhone Pro</p>
                <p><strong>OS:</strong> OriginWeb v1.0</p>
                <button onclick="closeSettings()">Back to Home</button>
            </div>

            <div class="nav-bar">
                <div class="home-button" onclick="closeSettings()"></div>
            </div>
        </div>
    </div>

    <script>
        // Simple logic to handle the "OS" feel
        function openSettings() {
            document.getElementById('settings-page').classList.add('active');
        }

        function closeSettings() {
            document.getElementById('settings-page').classList.remove('active');
        }

        // Update clock
        function updateClock() {
            const now = new Date();
            const time = now.getHours().toString().padStart(2, '0') + ":" + 
                         now.getMinutes().toString().padStart(2, '0');
            document.getElementById('clock').innerText = time;
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>

</body>
</html>
