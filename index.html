<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BetaOS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        
        body { 
            background: #121212; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
        }

        /* PHONE FRAME */
        .phone {
            width: 300px;
            height: 620px;
            background: #000;
            border: 10px solid #222;
            border-radius: 45px;
            position: relative;
            /* overflow: hidden; Removed to let the side button show */
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        /* Screen Wrapper to clip content since overflow:hidden moved here */
        .screen-container {
            width: 100%;
            height: 100%;
            border-radius: 35px;
            overflow: hidden;
            position: relative;
        }

        /* RED POWER BUTTON */
        .power-btn {
            position: absolute;
            right: -15px; /* Sticks out from the frame */
            top: 120px;
            width: 8px;
            height: 50px;
            background: #ff3b30; /* Vibrant Red */
            border-radius: 0 5px 5px 0;
            cursor: pointer;
            transition: 0.2s;
            z-index: 1000;
        }

        .power-btn:active {
            transform: translateX(-2px);
            background: #d12b22;
        }

        /* UNIVERSAL WALLPAPER */
        .screen {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: url('wallpaper.jpg');
            background-size: cover;
            background-position: center;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s;
        }

        /* NAVIGATION STATES */
        .hidden { opacity: 0; pointer-events: none; transform: scale(0.9); }
        .active { opacity: 1; pointer-events: all; transform: scale(1); }

        /* LOCK SCREEN */
        #lock-screen {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 80px 20px;
            color: white;
            z-index: 500; /* Stays on top when locking */
        }

        .time { font-size: 3.5rem; font-weight: 300; }
        .date { font-size: 1rem; margin-top: -5px; opacity: 0.9; }

        /* HOME SCREEN */
        #home-screen { padding: 50px 15px; z-index: 10; }

        .app-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-top: 20px;
        }

        .app {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .app:active { transform: scale(0.85); }

        .icon {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            margin-bottom: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
        }

        .app span { color: white; font-size: 0.65rem; }

        /* APP WINDOWS */
        .app-window {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #f2f2f7;
            z-index: 100;
            transform: scale(0.5);
            opacity: 0;
            pointer-events: none;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.2s;
            padding: 50px 20px;
        }

        .app-window.open {
            transform: scale(1);
            opacity: 1;
            pointer-events: all;
        }

        /* SETTINGS UI */
        .header { font-size: 1.5rem; font-weight: bold; margin-bottom: 20px; color: #000; }
        .list-item {
            background: white;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            color: #333;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        /* GESTURE BAR */
        .home-bar {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 110px;
            height: 5px;
            background: rgba(255,255,255,0.8);
            border-radius: 10px;
            z-index: 2000; /* Highest priority */
            cursor: pointer;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .unlock-area { animation: bounce 2s infinite; color: white; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="phone">
        <div class="power-btn" onclick="lockPhone()"></div>

        <div class="screen-container">
            <div id="lock-screen" class="screen active" onclick="unlock()">
                <div style="text-align: center;">
                    <div class="time" id="clock">14:02</div>
                    <div class="date">Friday, April 10</div>
                </div>
                <div class="unlock-area">Tap to unlock</div>
            </div>

            <div id="home-screen" class="screen hidden">
                <div class="app-grid">
                    <div class="app" onclick="openApp('settings-app')">
                        <div class="icon" style="background: #9ea0a4;">⚙️</div>
                        <span>Settings</span>
                    </div>
                    <div class="app">
                        <div class="icon" style="background: #ff9500;">🎨</div>
                        <span>Themes</span>
                    </div>
                    <div class="app">
                        <div class="icon" style="background: #34c759;">📞</div>
                        <span>Phone</span>
                    </div>
                    <div class="app">
                        <div class="icon" style="background: #007aff;">💬</div>
                        <span>Messages</span>
                    </div>
                </div>
            </div>

            <div id="settings-app" class="app-window">
                <div class="header">Settings</div>
                <div class="list-item"><span>About Phone</span> <span>></span></div>
                <div class="list-item"><span>Display & Brightness</span> <span>></span></div>
                <div class="list-item"><span>Wallpaper</span> <span>></span></div>
                <div class="list-item"><span>Security</span> <span>></span></div>
                <div class="list-item"><span>System Updates</span> <span>></span></div>
            </div>

            <div class="home-bar" onclick="closeAll()"></div>
        </div>
    </div>

    <script>
        // NAVIGATION LOGIC
        function unlock() {
            document.getElementById('lock-screen').classList.remove('active');
            document.getElementById('lock-screen').classList.add('hidden');
            document.getElementById('home-screen').classList.remove('hidden');
            document.getElementById('home-screen').classList.add('active');
        }

        function lockPhone() {
            // Close any open apps
            const windows = document.querySelectorAll('.app-window');
            windows.forEach(win => win.classList.remove('open'));

            // Hide Home, Show Lock
            document.getElementById('home-screen').classList.add('hidden');
            document.getElementById('home-screen').classList.remove('active');
            
            document.getElementById('lock-screen').classList.remove('hidden');
            document.getElementById('lock-screen').classList.add('active');
        }

        function openApp(appId) {
            document.getElementById(appId).classList.add('open');
        }

        function closeAll() {
            if (document.getElementById('lock-screen').classList.contains('active')) return;
            const windows = document.querySelectorAll('.app-window');
            windows.forEach(win => win.classList.remove('open'));
            document.getElementById('home-screen').classList.add('active');
            document.getElementById('home-screen').classList.remove('hidden');
        }

        // LIVE TIME
        function updateTime() {
            const now = new Date();
            const timeStr = now.getHours().toString().padStart(2, '0') + ":" + 
                            now.getMinutes().toString().padStart(2, '0');
            document.getElementById('clock').innerText = timeStr;
        }
        setInterval(updateTime, 1000);
        updateTime();
    </script>
</body>
</html>
