<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HyperOS Pro - Real Hardware Bezels</title>
    <style>
        :root {
            --phone-width: 360px; 
            --phone-height: 720px;
            --icon-radius: 14px;
            --fluid-bezier: cubic-bezier(0.3, 0, 0.1, 1);
            --anim-speed: 0.9s; /* Slower, more premium feel */
            --glass: rgba(255, 255, 255, 0.15);
            --inner-radius: 38px;
        }

        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: #000; display: flex;
            justify-content: center; align-items: center;
            font-family: 'Inter', sans-serif;
        }

        /* THE PHYSICAL FRAME */
        #phone-shell {
            width: var(--phone-width);
            height: var(--phone-height);
            background: #111;
            border-radius: 50px;
            padding: 12px; /* This creates the thick physical bezel */
            box-shadow: 0 0 0 2px #333, 0 30px 60px rgba(0,0,0,0.8);
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* THE ACTUAL SCREEN */
        #phone-container {
            width: 100%;
            height: 100%;
            background: #000;
            border-radius: var(--inner-radius);
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 0 10px rgba(0,0,0,1);
        }

        /* Screen-top reflections to look like glass */
        #phone-container::after {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: var(--inner-radius);
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: 2000;
        }

        .power-btn {
            position: absolute; right: -4px; top: 160px;
            width: 4px; height: 60px; background: #222;
            border-radius: 0 4px 4px 0; cursor: pointer;
        }

        #display-content { width: 100%; height: 100%; transition: opacity 0.5s ease; }
        .screen-off { opacity: 0; pointer-events: none; }

        .punch-hole {
            position: absolute; top: 18px; left: 50%; transform: translateX(-50%);
            width: 12px; height: 12px; background: #050505; border-radius: 50%; z-index: 1000;
        }

        .status-bar {
            position: absolute; top: 18px; width: 100%;
            padding: 0 30px; display: flex; justify-content: space-between;
            color: white; font-size: 11px; z-index: 900; box-sizing: border-box;
        }

        #homescreen-wall {
            position: absolute; width: 100%; height: 100%;
            background: url('https://images.unsplash.com/photo-1635776062127-d379bfcba9f8?auto=format&fit=crop&w=600') center/cover;
            transition: transform var(--anim-speed) var(--fluid-bezier), filter var(--anim-speed) var(--fluid-bezier);
        }

        .app-open-active #homescreen-wall { transform: scale(1.15); filter: blur(15px) brightness(0.6); }

        #homescreen { position: relative; width: 100%; height: 100%; padding: 60px 25px; box-sizing: border-box; }
        .app-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }

        .dock {
            position: absolute; bottom: 25px; left: 15px; right: 15px;
            height: 68px; background: rgba(255,255,255,0.15);
            backdrop-filter: blur(20px); border-radius: 26px;
            display: flex; justify-content: space-evenly; align-items: center;
        }

        .app-icon {
            width: 54px; height: 54px; 
            border-radius: var(--icon-radius);
            cursor: pointer; transition: transform 0.2s;
            overflow: hidden; display: flex; align-items: center; justify-content: center;
        }

        /* FIXED: Messages app size match */
        .app-icon.msg-special { 
            background: #fff; 
            padding: 14px; /* Shrunk specifically to match PNG proportion */
        }
        
        .app-icon img { width: 100%; height: 100%; object-fit: contain; }
        .app-icon:active { transform: scale(0.9); }
        .app-label { color: white; font-size: 10px; margin-top: 6px; text-align: center; display: block; }

        #app-window {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1500; transform: scale(0); opacity: 0;
            transition: transform var(--anim-speed) var(--fluid-bezier), opacity 0.4s ease;
            background: #fff; border-radius: var(--inner-radius);
        }
        #app-window.open { transform: scale(1); opacity: 1; }

        .nav-bar {
            position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
            width: 100px; height: 4px; background: rgba(255,255,255,0.4); border-radius: 10px; z-index: 2100;
        }
        .dark-bar { background: rgba(0,0,0,0.2); }
    </style>
</head>
<body>

    <div id="phone-shell">
        <div class="power-btn" id="pwr-btn"></div>
        <div id="phone-container">
            <div id="display-content">
                <div class="punch-hole"></div>
                <div class="status-bar"><span>09:41</span><span>📶 🔋</span></div>
                
                <div id="homescreen-wall"></div>

                <div id="homescreen">
                    <div class="app-grid">
                        <div>
                            <div class="app-icon" data-name="Settings"><img src="https://hyperosupdates.com/wp-content/themes/miuidownload/icons/com.android.settings.webp"></div>
                            <span class="app-label">Settings</span>
                        </div>
                        <div>
                            <div class="app-icon" data-name="Gallery"><img src="https://hyperosupdates.com/wp-content/themes/miuidownload/icons/com.miui.gallery.webp"></div>
                            <span class="app-label">Gallery</span>
                        </div>
                    </div>

                    <div class="dock">
                        <div class="app-icon" data-name="Phone"><img src="https://play-lh.googleusercontent.com/bk3e0glVbvRC4Z0uEZ5Oso5wjS89r1P_X5e-k3N_UBkTPXZLhGv50rRy7LAuDzzC9w=w240-h480-rw"></div>
                        <div class="app-icon msg-special" data-name="Messages"><img src="https://upload.wikimedia.org/wikipedia/commons/thumb/6/67/Google_Messages_icon_%282022%29.svg/250px-Google_Messages_icon_%282022%29.svg.png"></div>
                        <div class="app-icon" data-name="Browser"><img src="https://downloadr2.apkmirror.com/wp-content/uploads/2020/07/79/5f06abb0c532a.png"></div>
                        <div class="app-icon" data-name="Camera"><img src="https://hyperosupdates.com/wp-content/themes/miuidownload/icons/com.android.camera.webp"></div>
                    </div>
                </div>

                <div id="app-window">
                    <div style="padding: 80px 30px; color:#000;">
                        <h1 id="app-title">Settings</h1>
                        <p>Hardware bezels added. Animation duration set to 0.9s.</p>
                    </div>
                </div>

                <div class="nav-bar" id="nav-indicator"></div>
            </div>
        </div>
    </div>

    <script>
        const appWindow = document.getElementById('app-window');
        const phone = document.getElementById('phone-container');
        const nav = document.getElementById('nav-indicator');
        const display = document.getElementById('display-content');
        let isPowerOn = true;

        document.querySelectorAll('.app-icon').forEach(icon => {
            icon.onclick = () => {
                if(!isPowerOn) return;
                const name = icon.getAttribute('data-name');
                const rect = icon.getBoundingClientRect();
                const containerRect = phone.getBoundingClientRect();
                
                const originX = ((rect.left + rect.width/2) - containerRect.left) / containerRect.width * 100;
                const originY = ((rect.top + rect.height/2) - containerRect.top) / containerRect.height * 100;
                
                appWindow.style.transformOrigin = `${originX}% ${originY}%`;
                document.getElementById('app-title').innerText = name;
                appWindow.classList.add('open');
                phone.classList.add('app-open-active');
                nav.classList.add('dark-bar');
            };
        });

        nav.onclick = () => {
            appWindow.classList.remove('open');
            phone.classList.remove('app-open-active');
            nav.classList.remove('dark-bar');
        };

        document.getElementById('pwr-btn').onclick = () => {
            isPowerOn = !isPowerOn;
            display.classList.toggle('screen-off', !isPowerOn);
        };
    </script>
</body>
</html>
