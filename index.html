<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaOS V2</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        
        body { 
            background: #1a1a1a; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
        }

        /* COMPACT PHONE FRAME */
        .phone {
            width: 300px; /* Smaller, more realistic size */
            height: 620px;
            background: #000;
            border: 10px solid #222;
            border-radius: 45px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        /* UNIVERSAL WALLPAPER */
        .screen {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: url('wallpaper.jpg'); /* USE YOUR IMAGE HERE */
            background-size: cover;
            background-position: center;
            display: none;
            flex-direction: column;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .active { display: flex; }

        /* LOCK SCREEN */
        #lock-screen {
            justify-content: space-between;
            align-items: center;
            padding: 80px 20px;
            color: white;
            z-index: 10;
        }

        .time { font-size: 3.5rem; font-weight: 300; }
        .date { font-size: 1rem; margin-top: -5px; opacity: 0.9; }
        
        .unlock-area {
            margin-bottom: 20px;
            text-align: center;
            animation: bounce 2s infinite;
            cursor: pointer;
        }

        /* HOME SCREEN */
        #home-screen {
            padding: 50px 15px;
        }

        .app-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-top: 20px;
        }

        .app {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
        }

        .icon {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            margin-bottom: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            transition: transform 0.2s;
        }

        .icon:active { transform: scale(0.9); }
        .app span { color: white; font-size: 0.65rem; }

        /* SETTINGS PAGE */
        #settings {
            background: #f2f2f7;
            padding: 50px 20px;
        }

        .header { font-size: 1.5rem; font-weight: bold; margin-bottom: 20px; }
        .list-item {
            background: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
        }

        /* HOME INDICATOR (The Bar at the bottom) */
        .home-bar {
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 4px;
            background: rgba(255,255,255,0.6);
            border-radius: 10px;
            z-index: 100;
            cursor: pointer;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body>

    <div class="phone">
        <div id="lock-screen" class="screen active" onclick="unlock()">
            <div style="text-align: center;">
                <div class="time" id="clock">14:02</div>
                <div class="date">Friday, April 10</div>
            </div>
            <div class="unlock-area">
                <p>Tap to unlock</p>
            </div>
        </div>

        <div id="home-screen" class="screen">
            <div class="app-grid">
                <div class="app" onclick="openSettings()">
                    <div class="icon" style="background: #9ea0a4;">⚙️</div>
                    <span>Settings</span>
                </div>
                <div class="app">
                    <div class="icon" style="background: #ff9500;">🎨</div>
                    <span>Themes</span>
                </div>
                <div class="app">
                    <div class="icon" style="background: #34c759;">📞</div>
                    <span>Phone</span>
                </div>
                <div class="app">
                    <div class="icon" style="background: #007aff;">💬</div>
                    <span>Messages</span>
                </div>
            </div>
        </div>

        <div id="settings" class="screen">
            <div class="header">Settings</div>
            <div class="list-item"><span>About Phone</span> <span>></span></div>
            <div class="list-item"><span>Display</span> <span>></span></div>
            <div class="list-item"><span>Wallpapers</span> <span>></span></div>
            <div class="list-item" style="color: red; font-weight: bold;" onclick="goHome()">Back to Home</div>
        </div>

        <div class="home-bar" onclick="goHome()"></div>
    </div>

    <script>
        function unlock() {
            document.getElementById('lock-screen').classList.remove('active');
            document.getElementById('home-screen').classList.add('active');
        }

        function openSettings() {
            document.getElementById('home-screen').classList.remove('active');
            document.getElementById('settings').classList.add('active');
        }

        function goHome() {
            const screens = document.querySelectorAll('.screen');
            screens.forEach(s => s.classList.remove('active'));
            document.getElementById('home-screen').classList.add('active');
        }

        // Live Clock
        function updateTime() {
            const now = new Date();
            const timeStr = now.getHours().toString().padStart(2, '0') + ":" + 
                            now.getMinutes().toString().padStart(2, '0');
            document.getElementById('clock').innerText = timeStr;
        }
        setInterval(updateTime, 1000);
        updateTime();
    </script>
</body>
</html>
